spring.application.name=presupuesto-api

server.port=${SERVER_PORT:3012}
server.address=${SERVER_ADDRESS:0.0.0.0}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLServerLegacyDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

app.jwt.secret=${JWT_SECRET:presupuesto-local-secret-key-change-me}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

docs.security.username=${DOCS_USERNAME}
docs.security.password=${DOCS_PASSWORD}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
